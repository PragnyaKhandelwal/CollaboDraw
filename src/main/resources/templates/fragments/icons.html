<!--

  inline logo mark) instead of needing separate light/dark asset variants like the
  raster PNG toolbar icons do.

  Usage: th:replace this fragment once near the top of <body>, then reference any
  icon with:
    <svg class="icon" aria-hidden="true"><use href="#icon-bell"></use></svg>
